palette:
  base00: "{{ colors.background.default.hex | harmonize: {{ base16.base00.default.hex }} }}"
  base01: "{{ colors.surface_container.default.hex | harmonize: {{ base16.base01.default.hex }} | lighten: 1.2 }}"
  base02: "{{ colors.surface_container_high.default.hex | harmonize: {{ base16.base02.default.hex }} | lighten: 1.2 }}"
  base03: "{{ colors.surface_container_highest.default.hex | harmonize: {{ base16.base03.default.hex }} | lighten : 1.2 }}"
  base04: "{{ colors.outline.default.hex }}"
  base05: "{{ colors.on_surface_variant.default.hex }}"
  base06: "{{ colors.on_surface.default.hex }}"
  base07: "{{ colors.on_background.default.hex }}"
  base08: "{{ colors.primary.default.hex | set_red: 255 | set_hue: 0 }}"
  base09: "{{ colors.primary.default.hex | set_red: 200 | set_green: 150 | set_hue: 30 }}"
  base0A: "{{ colors.primary.default.hex | set_green: 220 | set_hue: 60 }}"
  base0B: "{{ colors.primary.default.hex | set_green: 255 | set_hue: 120 }}"
  base0C: "{{ colors.primary.default.hex | set_blue: 200 | set_hue: 165 }}"
  base0D: "{{ colors.primary.default.hex | set_blue: 255 | set_hue: 200 }}"
  base0E: "{{ colors.primary.default.hex | set_red: 180 | set_blue: 220 | set_hue: 270 }}"
  base0F: "{{ colors.primary.default.hex | set_red: 220 | set_blue: 100 | set_hue: 330 }}"
