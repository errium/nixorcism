palette:
  base00: "{{background}}"
  base01: "{{background | lighten(0.05)}}"
  base02: "{{background | lighten(0.15)}}"
  base03: "{{color8}}"
  base04: "{{color7}}"
  base05: "{{foreground}}"
  base06: "{{foreground | lighten(0.05)}}"
  base07: "{{foreground | lighten(0.15)}}"
  base08: "{{color1 | blend("#ff6666")}}"
  base09: "{{color1 | blend("#ffaa66")}}"
  base0A: "{{color3 | blend("#ffff66")}}"
  base0B: "{{color2 | blend("#66ff66")}}"
  base0C: "{{color6 | blend("#66ffff")}}"
  base0D: "{{color4 | blend("#6699ff")}}"
  base0E: "{{color5 | blend("#cc66ff")}}"
  base0F: "{{color1 | blend("#aa6644")}}"
